<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ===== แก้ชื่อแท็บเบราว์เซอร์ตรงนี้ ===== -->
  <title>เว็บแรกของฉัน</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Tahoma", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #6e5cff, #00c2ff);
      color: #fff;
      padding: 24px;
    }
    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      margin: 0 auto 18px;
      background: rgba(255, 255, 255, 0.9);
      display: grid; place-items: center;
      font-size: 40px; font-weight: 700; color: #6e5cff;
    }
    h1 { font-size: 26px; margin-bottom: 8px; }
    .role { opacity: 0.9; margin-bottom: 18px; }
    p { line-height: 1.7; opacity: 0.95; }
    .links { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .links a {
      color: #fff; text-decoration: none; font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 9px 18px; border-radius: 999px;
      transition: background 0.15s;
    }
    .links a:hover { background: rgba(255, 255, 255, 0.2); }
    footer { margin-top: 26px; font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">

    <!-- ===== แก้อักษรย่อในวงกลม (เช่นชื่อย่อของคุณ) ===== -->
    <div class="avatar">A</div>

    <!-- ===== แก้ชื่อของคุณตรงนี้ ===== -->
    <h1>สวัสดี ฉันชื่อ ___________</h1>

    <!-- ===== แก้สาขา/ชั้นปี ตรงนี้ ===== -->
    <p class="role">นักศึกษาวิศวกรรมคอมพิวเตอร์</p>

    <!-- ===== เขียนแนะนำตัวสั้น ๆ ตรงนี้ ===== -->
    <p>นี่คือเว็บแรกของฉันบน GitHub Pages! ฉันสนใจเรื่อง _______ และกำลังเรียนรู้การใช้ GitHub</p>

    <!-- ===== แก้ลิงก์ของคุณ (เปลี่ยน your-username เป็นชื่อผู้ใช้จริง) ===== -->
    <div class="links">
      <a href="https://github.com/your-username" target="_blank" rel="noopener">GitHub ของฉัน</a>
    </div>

    <footer>สร้างด้วย GitHub Pages · Special Topic 1</footer>
  </div>
</body>
</html>
